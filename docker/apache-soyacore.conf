# DocumentRoot diarahkan ke /public — jangan ke root project, supaya .env
# dan folder app/ tidak pernah bisa diakses lewat HTTP.
<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    # Log ke stdout/stderr supaya terbaca di dashboard Render.
    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
